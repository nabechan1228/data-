name: security-audit

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (backend)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r CarpAnalytics/backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CarpAnalytics/frontend/package-lock.json

      - name: npm audit (frontend)
        working-directory: CarpAnalytics/frontend
        run: |
          npm ci
          npm audit --audit-level=high
